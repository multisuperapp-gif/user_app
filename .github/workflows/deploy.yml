name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_env:
        description: Environment to deploy
        required: true
        default: DEV
        type: choice
        options:
          - DEV
          - SIT
          - UAT
          - PROD

env:
  APP_NAME: user_app
  CONTAINER_NAME: user_app
  APP_PORT: "8085"
  EC2_USER: ubuntu
  EC2_HOST: 44.217.176.56
  EC2_APP_DIR: /home/ubuntu/user_app
  HEALTH_CHECK_PATH: /actuator/health

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: mvn -B clean test

      - name: Package application
        run: mvn -B package -DskipTests

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.target_env || 'DEV' }}
    env:
      TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.target_env || 'DEV' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Package application
        run: mvn -B package -DskipTests

      - name: Select deployment profile
        id: target
        run: |
          case "$TARGET_ENV" in
            DEV) PROFILE="dev" ;;
            SIT) PROFILE="sit" ;;
            UAT) PROFILE="uat" ;;
            PROD) PROFILE="prod" ;;
            *)
              echo "Unsupported TARGET_ENV: $TARGET_ENV" >&2
              exit 1
              ;;
          esac

          echo "host=$EC2_HOST" >> "$GITHUB_OUTPUT"
          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" | sed 's/\\n/\n/g' | tr -d '\r' > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keygen -y -f ~/.ssh/ec2_key > /dev/null
          ssh-keyscan -H "${{ steps.target.outputs.host }}" >> ~/.ssh/known_hosts

      - name: Copy deployment files
        run: |
          ssh -i ~/.ssh/ec2_key "$EC2_USER@${{ steps.target.outputs.host }}" "mkdir -p '$EC2_APP_DIR'"
          scp -i ~/.ssh/ec2_key target/*.jar "$EC2_USER@${{ steps.target.outputs.host }}:$EC2_APP_DIR/app.jar"
          scp -i ~/.ssh/ec2_key Dockerfile "$EC2_USER@${{ steps.target.outputs.host }}:$EC2_APP_DIR/Dockerfile"

      - name: Restart container
        run: |
          IMAGE_TAG="$APP_NAME:${GITHUB_RUN_NUMBER}"
          ssh -i ~/.ssh/ec2_key "$EC2_USER@${{ steps.target.outputs.host }}" "
            set -e
            cd '$EC2_APP_DIR'
            docker container prune -f
            docker image prune -af
            docker builder prune -af
            docker rm -f '$CONTAINER_NAME' || true
            docker build -t '$IMAGE_TAG' .
            docker tag '$IMAGE_TAG' '$APP_NAME:latest'
            docker run -d \
              --name '$CONTAINER_NAME' \
              --restart unless-stopped \
              -p '$APP_PORT:$APP_PORT' \
              --env-file '$EC2_APP_DIR/${{ steps.target.outputs.profile }}.env' \
              -e SERVER_PORT='$APP_PORT' \
              -e SPRING_PROFILES_ACTIVE='${{ steps.target.outputs.profile }}' \
              '$IMAGE_TAG'
          "

      - name: Health check
        run: |
          for i in {1..18}; do
            status="$(curl -s "http://${{ steps.target.outputs.host }}:$APP_PORT$HEALTH_CHECK_PATH" | grep -o '"status":"UP"' || true)"

            if [ -n "$status" ]; then
              echo "$TARGET_ENV application is UP"
              exit 0
            fi

            echo "Waiting for $TARGET_ENV application to become healthy..."
            sleep 10
          done

          echo "$TARGET_ENV health check failed."
          exit 1
